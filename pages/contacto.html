<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Truth | Contacto</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
  <script src="https://kit.fontawesome.com/a223111b53.js" crossorigin="anonymous"></script>
</head>
<body class="d-flex flex-column min-vh-100">

    <!-- HEADER -->
  <header class="text-white sticky-top" id="header">
    <div class="container d-flex justify-content-between align-items-center py-2">
      <a href="./index.html" class="d-flex align-items-center">
        <img src="../assets/img/logo_header.png" alt="Logo Truth" id="logo">
      </a>
      <nav class="navbar navbar-expand-lg navbar-dark">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto text-center">
            <li class="nav-item"><a class="nav-link btn btn-light m-1" href="../index.html">Inicio</a></li>
            <li class="nav-item"><a class="nav-link btn btn-light m-1" href="./novedades.html">Novedades</a></li>
            <li class="nav-item"><a class="nav-link btn btn-light m-1" href="./cursos.html">Cursos</a></li>
            <li class="nav-item"><a class="nav-link btn btn-light m-1" href="./eventos.html">Eventos</a></li>
            <li class="nav-item"><a class="nav-link btn btn-light m-1" href="./contacto.html">Contacto</a></li>
          </ul>
        </div>
      </nav>
    </div>
  </header>

  <main class="contacto flex-grow-1 d-flex flex-column justify-content-center py-5">
    <div class="container">
      <h1 class="text-white text-center mb-5">CONTACTO</h1>

      <form class="formulario-contacto bg-light p-4 rounded-4 shadow mx-auto">
        <div class="row g-4">
          <div class="col-md-6">
            <label for="nombre" class="form-label fw-bold">Nombre</label>
            <input type="text" id="nombre" name="nombre" class="form-control" required />

            <label for="apellido" class="form-label fw-bold mt-3">Apellido</label>
            <input type="text" id="apellido" name="apellido" class="form-control" required />

            <label for="telefono" class="form-label fw-bold mt-3">Teléfono</label>
            <input type="text" id="telefono" name="telefono" class="form-control" />

            <label for="email" class="form-label fw-bold mt-3">Email</label>
            <input type="email" id="email" name="email" class="form-control" required />

            <button type="submit" class="btn btn-primary mt-4 w-100">Enviar</button>
          </div>

          <div class="col-md-6">
            <label class="form-label fw-bold">Seleccione la opción correspondiente</label>
            <div class="mb-3">
              <div class="form-check">
                <input class="form-check-input" type="radio" name="tipo" id="empresa" value="empresa" checked />
                <label class="form-check-label" for="empresa">Empresa</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="radio" name="tipo" id="particular" value="particular" />
                <label class="form-check-label" for="particular">Particular</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="radio" name="tipo" id="cliente" value="cliente" />
                <label class="form-check-label" for="cliente">Cliente</label>
              </div>
            </div>

            <label for="comentario" class="form-label fw-bold">Comentario</label>
            <textarea id="comentario" name="comentario" class="form-control" rows="7"></textarea>
          </div>
        </div>
      </form>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="text-white mt-auto py-3" id="footer">
    <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center">
      <nav class="mb-3 mb-md-0">
        <ul class="list-unstyled d-flex flex-wrap justify-content-center mb-0">
          <li class="mx-2"><a href="#" class="text-white"><i class="fa-brands fa-instagram me-2"></i>Instagram</a></li>
          <li class="mx-2"><a href="#" class="text-white"><i class="fa-brands fa-facebook me-2"></i>Facebook</a></li>
          <li class="mx-2"><a href="#" class="text-white"><i class="fa-solid fa-envelope me-2"></i>Email</a></li>
        </ul>
      </nav>
      <div class="subscribirse text-center text-md-end">
        <p>Suscribite</p>
        <form class="d-flex justify-content-center justify-content-md-end" role="search">
          <input type="email" class="form-control form-control-sm me-2" placeholder="Tu email" required />
          <button class="btn btn-light btn-sm" type="submit">Enviar</button>
        </form>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
